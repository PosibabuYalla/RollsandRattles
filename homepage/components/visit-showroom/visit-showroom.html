<!-- ================= VISIT OUR SHOWROOM COMPONENT ================= -->
<section class="rr-visit" id="visit" data-rr="visit">
  <style>
    .rr-visit {
      --navy: #1B2A4E;
      --pink: #FF4D94;
      --blue: #2F6FED;
      --gray: #6B7280;
      --hdr-primary: #09ADE9;
      --hdr-secondary: #DDF3F5;
      --font-display: 'Segoe UI', system-ui, -apple-system, sans-serif;
      --font-body: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      display: block;
      padding: 56px 0;
      background: #ffffff;
      font-family: var(--font-body);
      color: var(--navy);
    }
    .rr-visit *, .rr-visit *::before, .rr-visit *::after { box-sizing: border-box; }
    .rr-visit a { text-decoration: none; color: inherit; }
    .rr-visit .icon { flex-shrink: 0; vertical-align: middle; }
    .rr-visit .container { max-width: 1320px; margin: 0 auto; padding: 0 18px; }

    .rr-visit .eyebrow {
      display: inline-block; font-weight: 700; font-size: 11.5px; letter-spacing: 2px;
      text-transform: uppercase; color: var(--hdr-primary); background: var(--hdr-secondary);
      padding: 6px 16px; border-radius: 999px; margin-bottom: 14px;
    }
    .rr-visit .section-title { font-family: var(--font-display); font-weight: 800; font-size: 26px; line-height: 1.25; color: var(--navy); margin: 0; }
    .rr-visit .section-title .pink { color: var(--pink); }
    .rr-visit .section-title.left { text-align: left; margin: 0 0 24px; }

    .rr-visit .reveal { opacity: 0; transform: translateY(28px); transition: opacity 0.7s cubic-bezier(0.16, 0.84, 0.44, 1), transform 0.7s cubic-bezier(0.16, 0.84, 0.44, 1); }
    .rr-visit .reveal.in-view { opacity: 1; transform: none; }
    @media (prefers-reduced-motion: reduce) {
      .rr-visit .reveal { opacity: 1; transform: none; transition: none; }
    }

    .rr-visit .visit-inner { display: grid; grid-template-columns: 1fr; gap: 32px; align-items: center; }

    .rr-visit .visit-detail { display: flex; gap: 14px; margin-top: 20px; }
    .rr-visit .visit-icon {
      width: 42px; height: 42px; min-width: 42px; border-radius: 12px; background: var(--hdr-secondary);
      display: flex; align-items: center; justify-content: center; font-size: 17px;
    }
    .rr-visit .visit-detail strong { display: block; font-family: var(--font-display); font-weight: 700; font-size: 13.5px; color: var(--navy); margin-bottom: 4px; }
    .rr-visit .visit-detail p { margin: 0; font-size: 12.5px; line-height: 1.5; color: var(--gray); }

    .rr-visit .visit-buttons { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 26px; }
    .rr-visit .btn {
      display: flex; align-items: center; justify-content: center; gap: 8px; padding: 13px 16px; border-radius: 999px;
      font-weight: 600; font-size: 13px; white-space: nowrap; flex: 1 1 140px;
    }
    .rr-visit .btn-primary { background: var(--blue); color: #fff; box-shadow: 0 10px 24px rgba(47, 111, 237, 0.35); }
    .rr-visit .btn-secondary { background: #fff; color: var(--navy); box-shadow: 0 6px 20px rgba(27, 42, 78, 0.1); }
    .rr-visit .whatsapp-btn {
      display: flex; align-items: center; justify-content: center; gap: 8px; background: var(--hdr-primary); color: #fff;
      border-radius: 999px; padding: 13px 16px; font-weight: 600; font-size: 13px; white-space: nowrap;
      box-shadow: 0 8px 20px rgba(9, 173, 233, 0.32); transition: transform 0.2s ease, box-shadow 0.2s ease; flex: 1 1 140px;
    }
    .rr-visit .whatsapp-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 24px rgba(9, 173, 233, 0.4); }
    .rr-visit .whatsapp-btn span { display: inline; }

    .rr-visit .visit-visual { display: flex; align-items: center; justify-content: center; }
    .rr-visit .visit-map {
      width: 100%; aspect-ratio: 4 / 3; border-radius: 24px; overflow: hidden;
      box-shadow: 0 30px 60px rgba(27, 42, 78, 0.15); border: 1px solid rgba(184, 198, 224, 0.3);
    }
    .rr-visit .visit-map iframe { width: 100%; height: 100%; border: 0; display: block; }

    @media (min-width: 640px) {
      .rr-visit .container { padding: 0 28px; }
      .rr-visit { padding: 72px 0; }
    }

    @media (min-width: 768px) {
      .rr-visit .section-title { font-size: 32px; }
      .rr-visit .visit-buttons .btn, .rr-visit .visit-buttons .whatsapp-btn { font-size: 14px; padding: 15px 22px; }
    }

    @media (min-width: 960px) {
      .rr-visit .container { padding: 0 40px; }
      .rr-visit { padding: 96px 0; }
      .rr-visit .section-title { font-size: 38px; }
      .rr-visit .visit-inner { grid-template-columns: 1.1fr 0.9fr; gap: 60px; }
    }
  </style>

  <script>
    (function () {
      var root = document.querySelector('[data-rr="visit"]');
      if (!root) return;
      var revealEls = root.querySelectorAll('.reveal');
      if ('IntersectionObserver' in window && revealEls.length) {
        var groups = new Map();
        var observer = new IntersectionObserver(function (entries) {
          entries.forEach(function (entry) {
            if (!entry.isIntersecting) return;
            var el = entry.target;
            var parent = el.parentElement;
            var siblingIndex = groups.get(parent) || 0;
            el.style.transitionDelay = Math.min(siblingIndex, 6) * 70 + 'ms';
            groups.set(parent, siblingIndex + 1);
            el.classList.add('in-view');
            observer.unobserve(el);
          });
        }, { threshold: 0.15, rootMargin: '0px 0px -40px 0px' });
        revealEls.forEach(function (el) { observer.observe(el); });
      } else {
        revealEls.forEach(function (el) { el.classList.add('in-view'); });
      }
    })();
  </script>
