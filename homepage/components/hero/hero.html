<!-- ================= HERO COMPONENT ================= -->
<!-- Self-contained: inline <style>, no external CSS/JS/fonts, no header/footer -->
<section class="rr-hero" data-rr="hero">
  <style>
    .rr-hero {
      --navy: #1B2A4E;
      --pink: #FF4D94;
      --blue: #2F6FED;
      --gray: #6B7280;
      --hdr-secondary: #DDF3F5;
      --font-display: 'Segoe UI', system-ui, -apple-system, sans-serif;
      --font-body: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      display: block;
      position: relative;
      background-color: #ffffff;
      padding-top: 20px;
      overflow: hidden;
      font-family: var(--font-body);
      color: var(--navy);
      box-sizing: border-box;
    }
    .rr-hero *, .rr-hero *::before, .rr-hero *::after { box-sizing: border-box; }
    .rr-hero img { max-width: 100%; }
    .rr-hero a { text-decoration: none; color: inherit; }
    .rr-hero .icon { flex-shrink: 0; vertical-align: middle; }

    .rr-hero .container { max-width: 1320px; margin: 0 auto; padding: 0 18px; }

    .rr-hero .hero-inner {
      display: grid;
      grid-template-columns: 1fr;
      align-items: center;
      gap: 32px;
      text-align: center;
    }

    .rr-hero .hero-content { max-width: 520px; margin: 0 auto; }

    .rr-hero .hero-heading {
      font-family: var(--font-display);
      font-weight: 800;
      font-size: 30px;
      line-height: 1.18;
      display: flex;
      flex-direction: column;
      align-items: center;
      margin: 0;
    }
    .rr-hero .hero-heading .navy { color: var(--navy); }
    .rr-hero .hero-heading .pink { color: var(--pink); }

    .rr-hero .hero-sub {
      margin-top: 16px;
      font-size: 15px;
      line-height: 1.6;
      color: var(--gray);
      font-weight: 400;
    }

    .rr-hero .hero-buttons {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      margin-top: 24px;
    }

    .rr-hero .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      flex: 1 1 148px;
      padding: 13px 16px;
      border-radius: 999px;
      font-weight: 600;
      font-size: 13.5px;
      white-space: nowrap;
    }
    .rr-hero .btn-primary { background: var(--blue); color: #fff; box-shadow: 0 10px 24px rgba(47, 111, 237, 0.35); }
    .rr-hero .btn-secondary { background: #fff; color: var(--navy); box-shadow: 0 6px 20px rgba(27, 42, 78, 0.1); }

    .rr-hero .hero-image { position: relative; overflow: visible; }
    .rr-hero .hero-image img { width: 100%; max-width: 100%; height: auto; display: block; margin: 0 auto; }

    .rr-hero .stats-bar {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      background: #ffffff;
      border-radius: 20px;
      padding: 20px;
      margin: 32px 0 40px;
      box-shadow: 0 20px 50px rgba(27, 42, 78, 0.08);
      gap: 18px 12px;
    }

    .rr-hero .stat { display: flex; align-items: center; gap: 10px; min-width: 0; }

    .rr-hero .stat-icon {
      width: 44px; height: 44px; min-width: 44px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
    }
    .rr-hero .icon-blue { background: #DCEBFF; color: #2F6FED; }
    .rr-hero .icon-pink { background: #FDE0EC; color: #FF4D94; }
    .rr-hero .icon-purple { background: #EDE3FB; color: #8B5CF6; }
    .rr-hero .icon-gold { background: #FDF0D3; color: #E8A317; }

    .rr-hero .stat-text strong { display: block; font-family: var(--font-display); font-weight: 700; font-size: 16px; color: var(--navy); }
    .rr-hero .stat-text p { margin: 0; font-size: 12.5px; color: var(--gray); font-weight: 400; }

    .rr-hero .stat-divider { display: none; }

    @media (min-width: 480px) {
      .rr-hero .btn { flex: 0 1 auto; padding: 15px 24px; font-size: 15px; }
    }

    @media (min-width: 640px) {
      .rr-hero .container { padding: 0 28px; }
      .rr-hero .hero-heading { font-size: 38px; }
      .rr-hero .stats-bar { grid-template-columns: repeat(3, 1fr); padding: 26px 30px; }
    }

    @media (min-width: 768px) {
      .rr-hero .hero-heading { font-size: 44px; }
      .rr-hero .hero-sub { font-size: 16px; }
      .rr-hero .hero-buttons { gap: 14px; }
      .rr-hero .btn { padding: 16px 30px; font-size: 15.5px; }
      .rr-hero .stats-bar { gap: 22px 18px; padding: 28px 34px; }
      .rr-hero .stat-icon { width: 46px; height: 46px; min-width: 46px; }
      .rr-hero .stat-text strong { font-size: 17px; }
      .rr-hero .stat-text p { font-size: 13px; }
    }

    @media (min-width: 960px) {
      .rr-hero .container { padding: 0 40px; }
      .rr-hero .hero { padding-top: 30px; }
      .rr-hero .hero-inner { grid-template-columns: 0.85fr 1.3fr; gap: 10px; text-align: left; }
      .rr-hero .hero-content { margin: 0; }
      .rr-hero .hero-heading { font-size: 52px; align-items: flex-start; }
      .rr-hero .hero-sub { margin-top: 22px; font-size: 17px; }
      .rr-hero .hero-buttons { justify-content: flex-start; margin-top: 32px; gap: 16px; }
      .rr-hero .hero-image img { width: 122%; max-width: 122%; }
      .rr-hero .stats-bar { display: flex; flex-wrap: wrap; justify-content: space-between; padding: 30px 40px; margin: 50px 0 60px; gap: 20px; }
      .rr-hero .stat-icon { width: 48px; height: 48px; min-width: 48px; }
      .rr-hero .stat-text strong { font-size: 20px; white-space: nowrap; }
      .rr-hero .stat-text p { font-size: 14px; white-space: nowrap; }
    }

    @media (min-width: 1100px) {
      .rr-hero .stat-divider { display: block; width: 1px; height: 46px; background: #EAEAF0; }
    }
  </style>

  <div class="container hero-inner">

    <div class="hero-content">
      <h1 class="hero-heading">
        <span class="navy">Everything</span>
        <span class="navy">Your Child Needs,</span>
        <span class="pink">Under One Roof</span>
      </h1>
      <p class="hero-sub">4 Massive Floors. 10,000+ Products.<br>Premium Brands. Discount on Every Product.</p>
      <div class="hero-buttons">
        <a href="#" class="btn btn-primary">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M6 8h12l-1 12H7L6 8z" stroke="#fff" stroke-width="1.8" stroke-linejoin="round"/><path d="M9 8V6a3 3 0 0 1 6 0v2" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/></svg>
          Explore Products
        </a>
        <a href="#" class="btn btn-secondary">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M12 21s7-6.2 7-11.5A7 7 0 0 0 5 9.5C5 14.8 12 21 12 21z" stroke="#FF4D94" stroke-width="1.8" stroke-linejoin="round"/><circle cx="12" cy="9.5" r="2.3" stroke="#FF4D94" stroke-width="1.8"/></svg>
          Visit Showroom
        </a>
      </div>
    </div>

    <div class="hero-image">
      <img src="../../assests/Rolls_and_Rattles_Hero_Image.webp" alt="Happy family shopping at Rolls &amp; Rattles Kids Mart">
    </div>

  </div>

  <div class="container">
    <div class="stats-bar">

      <div class="stat">
        <span class="stat-icon icon-blue">
          <svg class="icon" width="22" height="22" viewBox="0 0 24 24" fill="none"><rect x="4" y="3" width="16" height="18" rx="1.5" stroke="#2F6FED" stroke-width="1.8"/><path d="M8 8h2M14 8h2M8 12h2M14 12h2M8 16h2M14 16h2" stroke="#2F6FED" stroke-width="1.8" stroke-linecap="round"/></svg>
        </span>
        <span class="stat-text"><strong>4</strong><p>Massive Floors</p></span>
      </div>

      <span class="stat-divider"></span>

      <div class="stat">
        <span class="stat-icon icon-pink">
          <svg class="icon" width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M6 8h12l-1 12H7L6 8z" stroke="#FF4D94" stroke-width="1.8" stroke-linejoin="round"/><path d="M9 8V6a3 3 0 0 1 6 0v2" stroke="#FF4D94" stroke-width="1.8" stroke-linecap="round"/></svg>
        </span>
        <span class="stat-text"><strong>10,000+</strong><p>Products</p></span>
      </div>

      <span class="stat-divider"></span>

      <div class="stat">
        <span class="stat-icon icon-purple">
          <svg class="icon" width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M12 3l2.6 5.6 6 .8-4.4 4.2 1 6.1L12 16.8 6.8 19.7l1-6.1L3.4 9.4l6-.8L12 3z" stroke="#8B5CF6" stroke-width="1.8" stroke-linejoin="round"/></svg>
        </span>
        <span class="stat-text"><strong>500+</strong><p>Premium Brands</p></span>
      </div>

      <span class="stat-divider"></span>

      <div class="stat">
        <span class="stat-icon icon-gold">
          <svg class="icon" width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M11 3h5a2 2 0 0 1 2 2v5a2 2 0 0 1-.6 1.4l-8 8a2 2 0 0 1-2.8 0l-4-4a2 2 0 0 1 0-2.8l8-8A2 2 0 0 1 11 3z" stroke="#E8A317" stroke-width="1.8" stroke-linejoin="round"/><circle cx="15" cy="8" r="1.3" fill="#E8A317"/></svg>
        </span>
        <span class="stat-text"><strong>Discount</strong><p>On Every Product</p></span>
      </div>

    </div>
  </div>
</section>
